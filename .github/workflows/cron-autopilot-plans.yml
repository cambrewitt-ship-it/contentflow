name: Generate Autopilot Plans

on:
  schedule:
    - cron: '0 9 * * 0'  # Every Sunday at 9am UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  generate-autopilot-plans:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger autopilot plan generation
        run: |
          curl -f -X GET "${{ secrets.APP_URL }}/api/cron/generate-autopilot-plans" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
